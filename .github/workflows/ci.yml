name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - 'docs/**'
  push:
    branches-ignore: [main]
    paths-ignore:
      - 'docs/**'

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            worker/package-lock.json

      - name: Install frontend deps
        run: npm ci
        working-directory: frontend

      - name: Install worker deps
        run: npm ci
        working-directory: worker

      - name: Lint frontend
        run: npm run lint
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      # The worker package does not define a build/typecheck script yet.
      - name: Typecheck worker
        run: npx tsc -p tsconfig.json --noEmit
        working-directory: worker
