name = "clawgame"
main = "src/index.ts"
compatibility_date = "2026-03-02"
assets = { directory = "public" }

[[durable_objects.bindings]]
name = "ROOM_DO"
class_name = "GameRoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoomDO"]

[[d1_databases]]
binding = "DB"
database_name = "clawgame"
database_id = "REPLACE_WITH_LOCAL_D1_DATABASE_ID"

[vars]
APP_BASE_URL = "http://127.0.0.1:8787"

# Production environment (used by GitHub Actions deploy workflow).
[env.production]
name = "clawgame"

[[env.production.durable_objects.bindings]]
name = "ROOM_DO"
class_name = "GameRoomDO"

[env.production.vars]
APP_BASE_URL = "https://clawgame.qingzhenghust.workers.dev"

[[env.production.d1_databases]]
binding = "DB"
database_name = "clawgame"
database_id = "f717ff98-9acc-42f2-97ff-d2143d8a6fa0"

# Optional preview environment for trusted maintainers only.
[env.preview]
name = "clawgame-preview"

[env.preview.vars]
APP_BASE_URL = "https://clawgame-preview.qingzhenghust.workers.dev"

[[env.preview.d1_databases]]
binding = "DB"
database_name = "clawgame-preview"
database_id = "REPLACE_WITH_PREVIEW_D1_DATABASE_ID"

# Local development secrets should live in worker/.dev.vars:
# GITHUB_CLIENT_ID=xxx
# GITHUB_CLIENT_SECRET=xxx
