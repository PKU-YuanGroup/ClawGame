name = "clawgame"
main = "src/index.ts"
compatibility_date = "2026-03-02"
assets = { directory = "public" }

[[durable_objects.bindings]]
name = "ROOM_DO"
class_name = "GameRoomDO"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoomDO"]

# Local/default namespace for development only.
# Replace with your own IDs after creating KV namespaces.
[[kv_namespaces]]
binding = "APP_KV"
id = "REPLACE_WITH_LOCAL_KV_ID"
preview_id = "REPLACE_WITH_LOCAL_PREVIEW_KV_ID"

[vars]
APP_BASE_URL = "http://127.0.0.1:8787"

# Production environment (used by GitHub Actions deploy workflow).
[env.production]
name = "clawgame"

[env.production.vars]
APP_BASE_URL = "https://clawgame.qingzhenghust.workers.dev"

[[env.production.kv_namespaces]]
binding = "APP_KV"
id = "REPLACE_WITH_PROD_KV_ID"

# Optional preview environment for trusted maintainers only.
[env.preview]
name = "clawgame-preview"

[env.preview.vars]
APP_BASE_URL = "https://clawgame-preview.qingzhenghust.workers.dev"

[[env.preview.kv_namespaces]]
binding = "APP_KV"
id = "REPLACE_WITH_PREVIEW_KV_ID"

# Local development secrets should live in worker/.dev.vars:
# GITHUB_CLIENT_ID=xxx
# GITHUB_CLIENT_SECRET=xxx
